<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Diamond -->
  <g transform="translate(10, 8)">
    <!-- Diamond shape -->
    <polygon points="35,0 55,35 35,70 15,35" fill="#F59E0B" opacity="0.9"/>
    <polygon points="35,0 55,35 35,35" fill="#D97706"/>
    <polygon points="35,0 15,35 35,35" fill="#F59E0B"/>
    <polygon points="35,35 55,35 35,70" fill="#B45309"/>
    <polygon points="35,35 15,35 35,70" fill="#D97706"/>
    <!-- Diamond facet lines -->
    <line x1="25" y1="0" x2="20" y2="35" stroke="#1A1A1A" stroke-width="0.8" opacity="0.3"/>
    <line x1="45" y1="0" x2="50" y2="35" stroke="#1A1A1A" stroke-width="0.8" opacity="0.3"/>
    <line x1="15" y1="35" x2="55" y2="35" stroke="#1A1A1A" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Excavator arm -->
  <g transform="translate(28, 5)" fill="#F59E0B">
    <!-- Boom (main arm) -->
    <polygon points="40,55 85,15 90,15 92,20 48,58" fill="#F59E0B"/>
    <!-- Stick (second arm) -->
    <polygon points="85,15 115,30 112,35 82,20" fill="#D97706"/>
    <!-- Bucket -->
    <path d="M112,30 L125,25 L128,32 L122,38 L115,38 L112,35 Z" fill="#F59E0B"/>
    <line x1="118" y1="38" x2="116" y2="44" stroke="#F59E0B" stroke-width="2.5"/>
    <line x1="122" y1="38" x2="121" y2="44" stroke="#F59E0B" stroke-width="2.5"/>
    <line x1="126" y1="35" x2="126" y2="42" stroke="#F59E0B" stroke-width="2.5"/>
    <!-- Hydraulic cylinder -->
    <line x1="50" y1="48" x2="90" y2="18" stroke="#D97706" stroke-width="2.5"/>
    <!-- Pivot point -->
    <circle cx="42" cy="55" r="3.5" fill="#D97706"/>
    <circle cx="87" cy="17" r="2.5" fill="#B45309"/>
  </g>

  <!-- Underline -->
  <rect x="10" y="88" width="145" height="2.5" rx="1" fill="#F59E0B"/>

  <!-- Text -->
  <text x="12" y="110" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="30" letter-spacing="0.5">
    <tspan fill="#F59E0B">Diamond</tspan>
    <tspan fill="#FFFFFF" dx="6">West Civil</tspan>
  </text>
</svg>
